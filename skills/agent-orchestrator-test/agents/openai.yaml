display_name: Agent Orchestrator Test
short_description: Run the pho_phong approval-gated Facebook flow with optional post-approval video creation
default_prompt: Coordinate the separate pho_phong workflow that drafts content, waits for user approval, creates one approved product image first, then at publish-decision stage offers optional product video creation through Media_Video, waits for user approval again if video is created, and proactively sends short progress updates while each long-running step is still in progress.
